<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahendra & Rama | Royal Wedding</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@300;400;600&family=Tiro+Devanagari+Hindi&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --royal-gold: #c5a059;
            --deep-gold: #8e6d13;
            --maroon: #5d0e11;
            --cream: #fffdf5;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--cream); font-family: 'Montserrat', sans-serif; color: #333; overflow-x: hidden; }

        /* --- ROYAL UI ELEMENTS --- */
        .royal-border { border: 2px solid var(--royal-gold); position: relative; padding: 20px; margin: 10px; }
        .royal-border::before { content: '⚜'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--cream); padding: 0 10px; color: var(--royal-gold); font-size: 1.5rem; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 0px; /* Sharp royal edges */
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .morpankh-text {
            font-family: 'Great Vibes', cursive;
            color: #1a4d4a; /* Tealish green for peacock theme */
            display: inline-block;
        }

        /* --- 1. HERO SECTION --- */
        #hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/hero-bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            position: relative;
        }

        .hero-content h1 { font-family: 'Cinzel Decorative', cursive; font-size: 5rem; color: var(--royal-gold); text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-content h2 { color: white; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; }

        /* --- 2. PRE-WEDDING SLIDER --- */
        .section-padding { padding: 100px 20px; text-align: center; }
        .prewedding-grid { display: flex; overflow-x: auto; gap: 20px; padding: 20px; scrollbar-width: none; }
        .pre-img { height: 500px; flex: 0 0 350px; border-radius: 10px; object-fit: cover; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* --- 3. TIMELINE & CARD --- */
        .timeline-container { max-width: 900px; margin: 0 auto; position: relative; }
        .event-card { margin: 20px 0; padding: 30px; display: flex; align-items: center; border-left: 4px solid var(--royal-gold); }
        
        /* --- 4. FAMILY GALLERY --- */
        .family-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .family-member { text-align: center; }
        .family-member img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--royal-gold); object-fit: cover; }

        /* --- MUSIC TOGGLE --- */
        #music-btn { position: fixed; bottom: 30px; right: 30px; z-index: 9999; background: var(--maroon); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--royal-gold); font-size: 1.5rem; }

        .feather { position: absolute; pointer-events: none; width: 40px; opacity: 0.6; z-index: 10; }
    </style>
</head>
<body>

    <audio id="audio-hero" loop><source src="music/aaj-sajya-hai.mpeg" type="audio/mpeg"></audio>
    <audio id="audio-card" loop><source src="music/padharo-sa.mp3" type="audio/mpeg"></audio>
    <audio id="audio-general" loop><source src="music/wedding-instrumental.mp3" type="audio/mpeg"></audio>

    <div id="music-btn" onclick="masterToggle()"><i class="fas fa-play"></i></div>

    <section id="hero">
        <div class="hero-content">
            <h2>Shubh Vivah</h2>
            <h1 id="main-title">Mahendra & Rama</h1>
            <p style="color: white; font-size: 1.5rem;" class="hindi-text">रविवार, 19 अप्रैल 2026</p>
            <div class="feather-container"></div>
        </div>
    </section>

    <section class="section-padding">
        <h2 class="morpankh-text" style="font-size: 3rem;">Pre-Wedding Glimpses</h2>
        <div class="prewedding-grid">
            <img src="images/pre1.jpg" class="pre-img reveal" alt="Shot 1">
            <img src="images/pre2.jpg" class="pre-img reveal" alt="Shot 2">
            <img src="images/pre3.jpg" class="pre-img reveal" alt="Shot 3">
            <img src="images/pre4.jpg" class="pre-img reveal" alt="Shot 4">
        </div>
    </section>

    <section class="section-padding" style="background: #fdfaf0;">
        <div class="royal-border" style="max-width: 1000px; margin: 0 auto;">
            <div style="display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center;">
                <div class="reveal">
                    <img src="images/groom.jpg" style="width: 250px; border-radius: 125px 125px 0 0;" alt="Groom">
                    <h3>Mahendra</h3>
                    <p class="hindi-text">सुपुत्र: श्री शंकर लाल जी जांगिड़</p>
                </div>
                <h1 style="font-family: 'Great Vibes'; font-size: 4rem; color: var(--royal-gold);">Weds</h1>
                <div class="reveal">
                    <img src="images/bride.jpg" style="width: 250px; border-radius: 125px 125px 0 0;" alt="Bride">
                    <h3>Rama</h3>
                    <p class="hindi-text">सुपुत्री: श्री विनोद कुमार जी जांगिड़</p>
                </div>
            </div>
        </div>
    </section>

    <section id="card-section" class="section-padding">
        <h2 class="morpankh-text" style="font-size: 3rem;">Digital Invitation</h2>
        <div class="timeline-container">
            <div class="glass-card reveal" style="padding: 10px; margin-bottom: 20px;">
                <img src="images/card1.jpg" style="width: 100%;" alt="Invitation Page 1">
            </div>
            <div class="glass-card reveal" style="padding: 10px; margin-bottom: 20px;">
                <img src="images/card2.jpg" style="width: 100%;" alt="Invitation Page 2">
            </div>
        </div>
    </section>

    <section class="section-padding" style="background: var(--maroon); color: white;">
        <h2 style="font-family: 'Cinzel Decorative'; color: var(--royal-gold);">Family Tree</h2>
        <div class="family-grid">
            <div class="family-member reveal">
                <img src="images/family1.jpg" alt="Family">
                <p>सीताराम जी</p>
            </div>
            <div class="family-member reveal">
                <img src="images/family2.jpg" alt="Family">
                <p>शम्भूदयाल जी</p>
            </div>
            <div class="family-member reveal">
                <img src="images/family3.jpg" alt="Family">
                <p>बनवारी लाल जी</p>
            </div>
        </div>
    </section>

    <footer style="padding: 50px; text-align: center; background: #111; color: var(--royal-gold);">
        <p class="morpankh-text" style="font-size: 1.5rem;">Created by Govind Jangid with Love</p>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Morpankh Writing Animation for Titles
        gsap.from(".morpankh-text", {
            scrollTrigger: ".morpankh-text",
            duration: 2.5,
            width: 0,
            opacity: 0,
            ease: "power2.inOut",
            stagger: 0.5
        });

        // Floating Feathers in Hero
        function addFeathers() {
            const container = document.querySelector('.feather-container');
            for(let i=0; i<10; i++) {
                let f = document.createElement('i');
                f.className = 'fas fa-leaf feather'; // Using leaf as feather icon placeholder
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 100 + 'vh';
                f.style.color = i % 2 == 0 ? '#1a4d4a' : '#c5a059';
                container.appendChild(f);
                gsap.to(f, {
                    y: "random(100, 500)",
                    x: "random(-100, 100)",
                    rotation: 360,
                    duration: "random(10, 20)",
                    repeat: -1,
                    ease: "none"
                });
            }
        }
        addFeathers();

        // Reveal Animations
        gsap.utils.toArray(".reveal").forEach(el => {
            gsap.from(el, {
                scrollTrigger: { trigger: el, start: "top 90%" },
                y: 100,
                opacity: 0,
                duration: 1.5,
                ease: "power3.out"
            });
        });

        // --- SMART MUSIC ENGINE ---
        const audioHero = document.getElementById('audio-hero');
        const audioCard = document.getElementById('audio-card');
        const audioGen = document.getElementById('audio-general');
        let isStarted = false;

        function masterToggle() {
            if(!isStarted) {
                isStarted = true;
                document.querySelector('#music-btn i').classList.replace('fa-play', 'fa-pause');
                checkScroll();
            } else {
                location.reload(); // Simple reset
            }
        }

        function stopAll() {
            [audioHero, audioCard, audioGen].forEach(a => { a.pause(); });
        }

        function checkScroll() {
            if(!isStarted) return;
            
            const cardPos = document.getElementById('card-section').getBoundingClientRect();
            const heroPos = document.getElementById('hero').getBoundingClientRect();

            if (heroPos.bottom > 0) {
                if (audioHero.paused) { stopAll(); audioHero.play(); }
            } else if (cardPos.top < window.innerHeight && cardPos.bottom > 0) {
                if (audioCard.paused) { stopAll(); audioCard.play(); }
            } else {
                if (audioGen.paused) { stopAll(); audioGen.play(); }
            }
        }

        window.addEventListener('scroll', checkScroll);
    </script>
</body>
</html>
